<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>待辦清單</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b67;
      --text-tertiary: #9e9e9a;
      --border-tertiary: rgba(0,0,0,0.12);
      --border-secondary: rgba(0,0,0,0.22);
      --border-primary: rgba(0,0,0,0.35);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg-secondary: #2a2a28;
        --text-primary: #f0f0ec;
        --text-secondary: #9e9e9a;
        --text-tertiary: #6b6b67;
        --border-tertiary: rgba(255,255,255,0.1);
        --border-secondary: rgba(255,255,255,0.18);
        --border-primary: rgba(255,255,255,0.28);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .app { max-width: 540px; margin: 0 auto; padding: 2.5rem 1.25rem; }

    .header { margin-bottom: 2rem; }
    .header h1 { font-size: 26px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .header p { font-size: 13px; color: var(--text-secondary); }

    .input-row { display: flex; gap: 8px; margin-bottom: 1.25rem; align-items: center; }
    .input-row input[type="text"] {
      flex: 1; height: 40px; padding: 0 12px;
      border: 0.5px solid var(--border-secondary);
      border-radius: var(--radius-md);
      background: var(--bg); color: var(--text-primary);
      font-size: 14px; font-family: var(--font); outline: none;
    }
    .input-row input[type="text"]:focus {
      border-color: var(--border-primary);
      box-shadow: 0 0 0 2px rgba(0,0,0,0.06);
    }
    .input-row input[type="text"]::placeholder { color: var(--text-tertiary); }

    .priority-picker { display: flex; gap: 5px; }
    .prio-opt {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      transition: transform 0.1s;
    }
    .prio-opt:hover { transform: scale(1.18); }
    .prio-opt.selected { border-color: var(--border-primary); }

    .add-btn {
      height: 40px; padding: 0 18px;
      border: 0.5px solid var(--border-secondary);
      border-radius: var(--radius-md);
      background: var(--bg); color: var(--text-primary);
      font-size: 14px; font-family: var(--font);
      cursor: pointer; white-space: nowrap; transition: background 0.15s;
    }
    .add-btn:hover { background: var(--bg-secondary); }
    .add-btn:active { transform: scale(0.98); }

    .filters { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .filter-btn {
      height: 28px; padding: 0 12px;
      border: 0.5px solid var(--border-tertiary);
      border-radius: 99px; background: transparent;
      color: var(--text-secondary); font-size: 12px;
      font-family: var(--font); cursor: pointer; transition: all 0.15s;
    }
    .filter-btn.active {
      background: var(--bg-secondary);
      border-color: var(--border-secondary);
      color: var(--text-primary); font-weight: 500;
    }
    .filter-btn:hover:not(.active) {
      border-color: var(--border-secondary);
      color: var(--text-primary);
    }

    .todo-list { display: flex; flex-direction: column; gap: 6px; }

    .todo-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px;
      background: var(--bg);
      border: 0.5px solid var(--border-tertiary);
      border-radius: var(--radius-lg);
      transition: border-color 0.15s, opacity 0.2s;
    }
    .todo-item:hover { border-color: var(--border-secondary); }
    .todo-item.done { opacity: 0.5; }

    .check-btn {
      width: 20px; height: 20px; flex-shrink: 0;
      border: 0.5px solid var(--border-secondary);
      border-radius: 50%; background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .check-btn.checked { background: var(--text-primary); border-color: var(--text-primary); }
    .check-btn.checked::after {
      content: '';
      display: block; width: 5px; height: 9px;
      border: 1.5px solid var(--bg);
      border-top: none; border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .priority-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .p-high { background: #E24B4A; }
    .p-mid  { background: #EF9F27; }
    .p-low  { background: #1D9E75; }

    .todo-text {
      flex: 1; font-size: 14px; color: var(--text-primary);
      line-height: 1.45; cursor: pointer; word-break: break-word;
    }
    .todo-item.done .todo-text {
      text-decoration: line-through; color: var(--text-tertiary);
    }
    .todo-text-input {
      flex: 1; font-size: 14px; color: var(--text-primary);
      border: none; background: transparent; outline: none;
      padding: 0; font-family: var(--font);
    }

    .del-btn {
      width: 24px; height: 24px; flex-shrink: 0;
      border: none; background: transparent;
      cursor: pointer; color: var(--text-tertiary);
      font-size: 18px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-md);
      transition: color 0.15s, background 0.15s;
      opacity: 0;
    }
    .todo-item:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: #E24B4A; background: var(--bg-secondary); }

    .empty {
      text-align: center; padding: 3rem 0;
      color: var(--text-tertiary); font-size: 13px;
    }

    .footer {
      margin-top: 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .count { font-size: 12px; color: var(--text-tertiary); }
    .clear-btn {
      font-size: 12px; color: var(--text-tertiary);
      background: none; border: none; cursor: pointer;
      font-family: var(--font); padding: 0;
    }
    .clear-btn:hover { color: var(--text-secondary); text-decoration: underline; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>待辦清單</h1>
    <p id="date-label"></p>
  </div>

  <div class="input-row">
    <input type="text" id="new-task" placeholder="新增任務…" />
    <div class="priority-picker" id="prio-picker">
      <div class="prio-opt selected" data-p="low"  style="background:#1D9E75" title="低優先"></div>
      <div class="prio-opt"          data-p="mid"  style="background:#EF9F27" title="中優先"></div>
      <div class="prio-opt"          data-p="high" style="background:#E24B4A" title="高優先"></div>
    </div>
    <button class="add-btn" id="add-btn">新增</button>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-f="all">全部</button>
    <button class="filter-btn" data-f="active">未完成</button>
    <button class="filter-btn" data-f="done">已完成</button>
    <button class="filter-btn" data-f="high">高優先</button>
  </div>

  <div class="todo-list" id="todo-list"></div>

  <div class="footer">
    <span class="count" id="count"></span>
    <button class="clear-btn" id="clear-done">清除已完成</button>
  </div>
</div>

<script>
  const PRIO_COLORS = { high: '#E24B4A', mid: '#EF9F27', low: '#1D9E75' };
  let todos = [];
  let filter = 'all';
  let selectedPrio = 'low';
  let editingId = null;

  try { todos = JSON.parse(localStorage.getItem('vt-todos') || '[]'); } catch(e) {}

  function save() { try { localStorage.setItem('vt-todos', JSON.stringify(todos)); } catch(e) {} }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  document.getElementById('date-label').textContent =
    new Date().toLocaleDateString('zh-TW', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  document.getElementById('prio-picker').addEventListener('click', e => {
    const opt = e.target.closest('.prio-opt');
    if (!opt) return;
    selectedPrio = opt.dataset.p;
    document.querySelectorAll('.prio-opt').forEach(o => o.classList.toggle('selected', o === opt));
  });

  document.getElementById('add-btn').addEventListener('click', addTask);
  document.getElementById('new-task').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  function addTask() {
    const inp = document.getElementById('new-task');
    const text = inp.value.trim();
    if (!text) return;
    todos.unshift({ id: uid(), text, done: false, priority: selectedPrio, created: Date.now() });
    save(); inp.value = ''; render();
  }

  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    filter = btn.dataset.f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    render();
  });

  document.getElementById('clear-done').addEventListener('click', () => {
    todos = todos.filter(t => !t.done); save(); render();
  });

  function filtered() {
    if (filter === 'active') return todos.filter(t => !t.done);
    if (filter === 'done')   return todos.filter(t => t.done);
    if (filter === 'high')   return todos.filter(t => t.priority === 'high');
    return todos;
  }

  function render() {
    const list = document.getElementById('todo-list');
    const items = filtered();
    list.innerHTML = items.length ? items.map(t => `
      <div class="todo-item${t.done ? ' done' : ''}" data-id="${t.id}">
        <button class="check-btn${t.done ? ' checked' : ''}" data-action="toggle"></button>
        <div class="priority-dot p-${t.priority}"></div>
        ${editingId === t.id
          ? `<input class="todo-text-input" data-action="edit-input" value="${esc(t.text)}" />`
          : `<span class="todo-text" data-action="start-edit">${esc(t.text)}</span>`}
        <button class="del-btn" data-action="delete" title="刪除">×</button>
      </div>`).join('')
    : '<div class="empty">沒有任務 ✓</div>';

    if (editingId) {
      const inp = list.querySelector('.todo-text-input');
      if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
    }
    const active = todos.filter(t => !t.done).length;
    document.getElementById('count').textContent = `${active} 項未完成，共 ${todos.length} 項`;
  }

  document.getElementById('todo-list').addEventListener('click', e => {
    const item = e.target.closest('.todo-item');
    if (!item) return;
    const tid = item.dataset.id;
    const action = (e.target.dataset.action || e.target.closest('[data-action]')?.dataset.action);
    if (action === 'toggle') {
      const t = todos.find(x => x.id === tid);
      if (t) { t.done = !t.done; save(); render(); }
    } else if (action === 'delete') {
      todos = todos.filter(x => x.id !== tid); save(); render();
    } else if (action === 'start-edit') {
      editingId = tid; render();
    }
  });

  document.getElementById('todo-list').addEventListener('keydown', e => {
    if (!e.target.matches('.todo-text-input')) return;
    if (e.key === 'Enter' || e.key === 'Escape') commitEdit(e.target);
  });

  document.getElementById('todo-list').addEventListener('blur', e => {
    if (e.target.matches('.todo-text-input')) commitEdit(e.target);
  }, true);

  function commitEdit(inp) {
    const val = inp.value.trim();
    if (val && editingId) {
      const t = todos.find(x => x.id === editingId);
      if (t) t.text = val;
      save();
    }
    editingId = null; render();
  }

  render();
</script>
</body>
</html>
